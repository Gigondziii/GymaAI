<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0A" />
  <title>GYMA — Your AI Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />

  <!-- SVG noise filter -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
  </svg>
</head>
<body>
  <div class="grain-overlay"></div>

  <!-- App mount point -->
  <div id="app"></div>

  <!-- Camera + canvas layer (used during workout) -->
  <div id="camera-layer" class="camera-layer hidden">
    <video id="workout-video" autoplay playsinline muted></video>
    <canvas id="pose-canvas"></canvas>
  </div>

  <!-- Bottom navigation (hidden until post-onboarding) -->
  <nav id="bottom-nav" class="bottom-nav hidden">
    <button class="nav-item active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-tab="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Schedule</span>
    </button>
    <button class="nav-item" data-tab="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progress</span>
    </button>
    <button class="nav-item" data-tab="account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Account</span>
    </button>
  </nav>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Confetti container -->
  <div id="confetti-container"></div>

  <!-- Tutorial spotlight overlay -->
  <div id="tutorial-overlay" class="tutorial-overlay hidden">
    <div class="tutorial-tooltip" id="tutorial-tooltip">
      <p id="tutorial-text"></p>
      <div class="tutorial-footer">
        <span id="tutorial-step-info"></span>
        <button id="tutorial-next-btn">Next</button>
      </div>
    </div>
  </div>

  <!-- Scripts — load order matters -->
  <script src="js/storage.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/pose.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/screens/splash.js"></script>
  <script src="js/screens/onboarding.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/workout-flow.js"></script>
  <script src="js/screens/schedule.js"></script>
  <script src="js/screens/progress.js"></script>
  <script src="js/screens/account.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
